app = 'go-test-embarkok-com'
org = 'embark-396'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[build.args]
  CONFIG = 'okc'

[env]
  PORT = '8080'
  NODE_ENV = 'production'
  CONFIG = 'okc'
  EMBARK_BASE_URL = 'https://staging.embarkok.com'
  ROOTLINK = 'https://go-test.embarkok.com'
  OTP_URL_DEV = 'https://otp.dev.okc.leonard.io/otp/'
  OTP_URL = 'https://otp.prod.okc.leonard.io/otp/'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  interval = '10s'
  timeout = '3s'
  grace_period = '10s'
  method = 'GET'
  path = '/'

[[vm]]
  size = 'shared-cpu-2x'
  memory = '1024mb'
