# fly.toml app configuration file generated for digitransit-ui on 2026-02-25T22:39:01Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'digitransit-ui'
primary_region = 'dfw'

[build]

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
